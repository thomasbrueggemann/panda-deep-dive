document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

04, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Press Start 2P';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"20a220f3-b821-4275-b29d-50e5cfd14bae\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root { --ink:#1a1c2c; --gold:#ffcd75; --pink:#ff77a8; --cyan:#73eff7; --sky:#0e1430; }\n  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }\n  html, body {\n    width:100%; height:100%; background:#05070f; overflow:hidden;\n    font-family:'Press Start 2P', monospace; color:#fff;\n    touch-action:none; user-select:none; -webkit-user-select:none;\n    overscroll-behavior:none; position:fixed;\n  }\n  #stage {\n    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);\n    width:min(100vw, calc(100dvh * 16 / 9));\n    height:min(100dvh, calc(100vw * 9 / 16));\n    container-type:size;\n    background:#0e1430; box-shadow:0 0 0 100vmax #05070f;\n    overflow:hidden;\n  }\n  #game {\n    position:absolute; inset:0; width:100%; height:100%;\n    image-rendering:pixelated; image-rendering:crisp-edges; display:block;\n  }\n  .overlay { position:absolute; inset:0; }\n  .hidden { display:none !important; }\n\n  /* ---------- TITLE ---------- */\n  #title { display:flex; flex-direction:column; align-items:center; justify-content:flex-start;\n    padding-top:9cqh; background:linear-gradient(180deg, rgba(5,7,18,0) 40%, rgba(5,7,18,0.35)); }\n  #title h1 { font-size:8.6cqw; line-height:1.35; text-align:center; color:var(--gold);\n    text-shadow:0.6cqw 0.6cqw 0 #b13e53, -0.2cqw -0.2cqw 0 #29366f; letter-spacing:0.1cqw; }\n  #title .sub { margin-top:3.4cqh; font-size:2.6cqw; color:var(--cyan); text-shadow:0.3cqw 0.3cqw 0 #1a1c2c; }\n  .btn { font-family:inherit; cursor:pointer; border:none; color:#1a1c2c;\n    background:var(--gold); padding:3cqh 5cqw; font-size:3.6cqw; border-radius:1.4cqw;\n    box-shadow:0 0.9cqh 0 #b07a2e, 0 0.9cqh 0 0.4cqw #1a1c2c; transition:transform .06s, box-shadow .06s; }\n  .btn:active { transform:translateY(0.7cqh); box-shadow:0 0.2cqh 0 #b07a2e, 0 0.2cqh 0 0.4cqw #1a1c2c; }\n  #startBtn { position:absolute; bottom:11cqh; font-size:4.4cqw; }\n  .tip { position:absolute; bottom:5cqh; font-size:2cqw; color:#94b0c2; text-align:center; width:100%; }\n\n  /* ---------- HUD ---------- */\n  #hud { pointer-events:none; }\n  #hearts { position:absolute; top:2.4cqh; left:2.4cqw; font-size:3.2cqw; letter-spacing:0.15cqw; line-height:1; max-width:60cqw; }\n  .heart { color:#ff5277; text-shadow:0.25cqw 0.25cqw 0 #5d1020; }\n  .heart.half { background:linear-gradient(90deg,#ff5277 0,#ff5277 50%,#3a3550 50%,#3a3550 100%);\n    -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:none; }\n  .heart.empty { color:#3a3550; text-shadow:none; }\n  #counters { position:absolute; top:2.4cqh; right:2.4cqw; display:flex; gap:2.4cqw; font-size:2.8cqw; }\n  .ctr { display:flex; align-items:center; gap:1cqw; }\n  .pip { width:2.4cqw; height:2.4cqw; display:inline-block; }\n  .pip.shell { background:var(--pink); border-radius:50% 50% 40% 40%; }\n  .pip.coin { background:var(--gold); border-radius:50%; }\n  #depth { position:absolute; top:7.6cqh; left:2.4cqw; font-size:2.2cqw; color:var(--cyan);\n    text-shadow:0.2cqw 0.2cqw 0 #1a1c2c; }\n\n  /* ---------- HINT banner ---------- */\n  #hint { position:absolute; top:14cqh; left:50%; transform:translateX(-50%);\n    pointer-events:none; font-size:2.8cqw; color:#fff; background:rgba(26,28,44,0.72);\n    padding:1.4cqh 3cqw; border-radius:1cqw; text-align:center; white-space:nowrap;\n    text-shadow:0.2cqw 0.2cqw 0 #000; }\n\n  /* ---------- CONTROLS ---------- */\n  #controls { pointer-events:none; }\n  #joyBase { position:absolute; left:4cqw; bottom:5cqh; width:24cqh; height:24cqh;\n    border-radius:50%; background:rgba(115,239,247,0.10); border:0.5cqw solid rgba(115,239,247,0.35);\n    pointer-events:auto; touch-action:none; }\n  #joyThumb { position:absolute; left:50%; top:50%; width:11cqh; height:11cqh; margin:-5.5cqh 0 0 -5.5cqh;\n    border-radius:50%; background:rgba(255,205,117,0.9); border:0.5cqw solid #1a1c2c; pointer-events:none; }\n  #actionBtn { position:absolute; right:5cqw; bottom:6cqh; width:18cqh; height:18cqh; border-radius:50%;\n    background:#ef7d57; border:0.6cqw solid #1a1c2c; color:#1a1c2c; font-family:inherit; font-size:2.4cqw;\n    pointer-events:auto; box-shadow:0 1cqh 0 #b13e53; display:flex; align-items:center; justify-content:center; }\n  #actionBtn.pressed { transform:translateY(0.7cqh); box-shadow:0 0.3cqh 0 #b13e53; }\n\n  /* ---------- MATH MODAL ---------- */\n  #math { background:rgba(5,7,18,0.55); display:flex; align-items:center; justify-content:center; z-index:60; }\n  .mathcard { background:#1a1c2c; border:0.6cqw solid var(--gold); border-radius:2cqw;\n    padding:4cqh 5cqw; width:74cqw; max-width:74cqw; text-align:center;\n    box-shadow:0 1.4cqh 0 rgba(0,0,0,0.4); }\n  #mathTitle { font-size:3cqw; color:var(--cyan); }\n  #mathEq { font-size:9cqw; color:#fff; margin:3.4cqh 0; text-shadow:0.4cqw 0.4cqw 0 #29366f; }\n  #mathEq .eqq { color:var(--gold); }\n  #mathChoices { display:flex; gap:3cqw; justify-content:center; flex-wrap:wrap; }\n  .choice { font-family:inherit; cursor:pointer; min-width:13cqw; padding:2.6cqh 2cqw; font-size:5cqw;\n    color:#1a1c2c; background:var(--cyan); border:0.4cqw solid #1a1c2c; border-radius:1.4cqw;\n    box-shadow:0 0.8cqh 0 #2a8a90; }\n  .choice:active { transform:translateY(0.5cqh); box-shadow:0 0.3cqh 0 #2a8a90; }\n  .choice.right { background:#a7f070; box-shadow:0 0.8cqh 0 #4f9c2e; }\n  .choice.wrong { background:#566c86; color:#aab; box-shadow:none; opacity:0.6; }\n  .mathHint { margin-top:3cqh; font-size:2.2cqw; color:#94b0c2; min-height:2.6cqw; }\n  .mathHint.good { color:#a7f070; } .mathHint.bad { color:#ff7a8a; }\n  .shake { animation:shk .3s; }\n  @keyframes shk { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-1.4cqw)} 75%{transform:translateX(1.4cqw)} }\n\n  /* ---------- ENDING ---------- */\n  #ending { background:rgba(5,7,18,0.62); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:60; }\n  #ending h2 { font-size:8cqw; color:var(--gold); text-shadow:0.6cqw 0.6cqw 0 #b13e53; text-align:center; }\n  #ending .stats { display:flex; gap:6cqw; margin:5cqh 0; font-size:3.4cqw; }\n  #ending .stat { display:flex; flex-direction:column; align-items:center; gap:1.6cqh; }\n  #ending .stat .pip { width:5cqw; height:5cqw; }\n  #ending .num { color:#fff; }\n  #ending .lbl { font-size:1.8cqw; color:#94b0c2; }\n\n  /* ---------- TOP BUTTONS ---------- */\n  #muteBtn { position:absolute; top:2cqh; left:50%; transform:translateX(-50%);\n    background:rgba(26,28,44,0.6); border:0.3cqw solid #566c86; color:#fff; font-size:3cqw;\n    width:7cqw; height:7cqw; border-radius:1cqw; cursor:pointer; z-index:50; line-height:1; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div id=\"stage\">\n    <canvas id=\"game\"><\u002Fcanvas>\n\n    <!-- HUD -->\n    <div id=\"hud\" class=\"overlay hidden\">\n      <div id=\"hearts\"><\u002Fdiv>\n      <div id=\"counters\">\n        <span id=\"shellBox\" class=\"ctr hidden\"><span class=\"pip shell\"><\u002Fspan><span id=\"shellC\">0<\u002Fspan><\u002Fspan>\n        <span id=\"coinBox\" class=\"ctr hidden\"><span class=\"pip coin\"><\u002Fspan><span id=\"coinC\">0<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div id=\"depth\" class=\"hidden\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- hint -->\n    <div id=\"hint\" class=\"hidden\"><\u002Fdiv>\n\n    <!-- controls -->\n    <div id=\"controls\" class=\"overlay hidden\">\n      <div id=\"joyBase\"><div id=\"joyThumb\"><\u002Fdiv><\u002Fdiv>\n      <button id=\"actionBtn\" class=\"hidden\"><span>DROP<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- math modal -->\n    <div id=\"math\" class=\"overlay hidden\">\n      <div class=\"mathcard\">\n        <div id=\"mathTitle\">SET FLIGHT LEVEL<\u002Fdiv>\n        <div id=\"mathEq\">4 + 3 <span class=\"eqq\">= ?<\u002Fspan><\u002Fdiv>\n        <div id=\"mathChoices\"><\u002Fdiv>\n        <div id=\"mathHint\" class=\"mathHint\">Tap the right answer!<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- title -->\n    <div id=\"title\" class=\"overlay hidden\">\n      <h1>PANDA<br>DEEP DIVE<\u002Fh1>\n      <div class=\"sub\">a math sea adventure<\u002Fdiv>\n      <button id=\"startBtn\" class=\"btn\" onclick=\"startGame()\">PLAY<\u002Fbutton>\n      <div class=\"tip\">Arrow keys or joystick to move<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ending -->\n    <div id=\"ending\" class=\"overlay hidden\">\n      <h2>YOU DID IT!<\u002Fh2>\n      <div class=\"stats\">\n        <div class=\"stat\"><span class=\"pip shell\"><\u002Fspan><span class=\"num\" id=\"endShells\">0<\u002Fspan><span class=\"lbl\">SHELLS<\u002Fspan><\u002Fdiv>\n        <div class=\"stat\"><span class=\"pip coin\"><\u002Fspan><span class=\"num\" id=\"endCoins\">0<\u002Fspan><span class=\"lbl\">COINS<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn\" onclick=\"playAgain()\">PLAY AGAIN<\u002Fbutton>\n    <\u002Fdiv>\n\n    <button id=\"muteBtn\" title=\"Sound on/off\">🔊<\u002Fbutton>\n  <\u002Fdiv>\n\n  \n\n  <script src=\"df87d0c0-578b-448b-b22d-344887017089\"><\u002Fscript>\n  <script src=\"cd5beb1a-63c0-42ee-a98e-f28b8e116e05\"><\u002Fscript>\n  <script src=\"73d2a857-83bd-4d23-a41a-33b9542b9e70\"><\u002Fscript>\n  <script src=\"4117aff1-3af9-4860-b0ee-5f00ee26d487\"><\u002Fscript>\n  <script src=\"07d8644b-1140-4bc1-959d-6d4e1cc6db41\"><\u002Fscript>\n  <script src=\"6ed1b831-4481-44a6-970f-962ad5efc9ce\"><\u002Fscript>\n
